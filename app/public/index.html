<script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef, createContext, useContext } = React;
        const isJointLoaded = () => typeof joint !== 'undefined' && joint.dia && joint.dia.Graph;

        const AuthContext = createContext(null);
        const AuthProvider = ({ children }) => {
            const [token, setToken] = useState(localStorage.getItem("pitchaprint_token") || "");
            const [user, setUser] = useState(null);
            const [credits, setCredits] = useState(0);
            const [loading, setLoading] = useState(false);

            const api = async (path, opts = {}) => {
                const url = `${window.ENV.API_URL}${path}`;
                const res = await fetch(url, {
                    headers: { "Content-Type": "application/json", ...(token ? { "Authorization": `Bearer ${token}` } : {}), ...opts.headers },
                    ...opts
                });
                const data = await res.json().catch(() => ({}));
                return { ok: res.ok, status: res.status, data };
            };

            const login = async (email, password) => {
                setLoading(true);
                const { ok, data } = await api("/login", { method: "POST", body: JSON.stringify({ email, password }) });
                setLoading(false);
                if (ok && data.token) {
                    setToken(data.token); localStorage.setItem("pitchaprint_token", data.token); setCredits(data.credits || 0); await fetchProfile();
                    if (typeof track !== 'undefined') track('login', { method: 'email', credits: data.credits || 0 });
                    return { success: true, credits: data.credits };
                }
                if (typeof track !== 'undefined') track('login_error', { error: data.error || "Login failed" });
                return { success: false, error: data.error || "Login failed" };
            };

            const signup = async (name, email, password) => {
                setLoading(true);
                const { ok, data } = await api("/signup", { method: "POST", body: JSON.stringify({ name, email, password }) });
                setLoading(false);
                if (ok) {
                    if (typeof track !== 'undefined') track('sign_up', { method: 'email' });
                    return { success: true };
                }
                if (typeof track !== 'undefined') track('sign_up_error', { error: data.error || "Signup failed" });
                return { success: false, error: data.error || "Signup failed" };
            };

            const fetchProfile = async () => {
                if (!token) return;
                const { ok, data } = await api("/me");
                if (ok) { setUser({ name: data.name, email: data.email }); setCredits(data.credits || 0); }
                else { logout(); }
            };

            const pay = async (amount) => {
                if (!token) return { success: false, error: "Please login first" };
                const { ok, data } = await api("/pay", { method: "POST", body: JSON.stringify({ amount }) });
                if (ok && data.authorization_url) {
                    if (typeof track !== 'undefined') track('begin_checkout', { value: amount, currency: 'KES', reference: data.reference });
                    return { success: true, url: data.authorization_url, reference: data.reference };
                }
                if (typeof track !== 'undefined') track('checkout_error', { error: data.error || "Payment init failed" });
                return { success: false, error: data.error || "Payment init failed" };
            };

            const verifyPayment = async (reference) => {
                if (!token) return { success: false, error: "Please login first" };
                const { ok, data } = await api(`/verify/${reference}`);
                if (ok && data.credited) { setCredits(data.new_balance || credits + (data.amount_added || 0)); await fetchProfile(); return { success: true, amount: data.amount_added, message: data.message }; }
                return { success: false, error: data.error || data.message || "Not verified yet" };
            };

            const logout = () => { setToken(""); setUser(null); setCredits(0); localStorage.removeItem("pitchaprint_token"); if (typeof track !== 'undefined') track('logout'); };
            useEffect(() => { if (token) fetchProfile(); }, [token]);

            return (
                <AuthContext.Provider value={{ token, user, credits, loading, login, signup, logout, pay, verifyPayment, fetchProfile, api }}>
                    {children}
                </AuthContext.Provider>
            );
        };
        const useAuth = () => useContext(AuthContext);

        const Storage = {
            db: null, DB_NAME: 'pitchaprint_db_v2', STORE_NAME: 'designs', DB_VERSION: 1,
            async init() {
                if (this.db) return this.db;
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.DB_NAME, this.DB_VERSION);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => { this.db = request.result; resolve(this.db); };
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(this.STORE_NAME)) {
                            const store = db.createObjectStore(this.STORE_NAME, { keyPath: 'id' });
                            store.createIndex('timestamp', 'timestamp', { unique: false });
                            store.createIndex('deviceName', 'deviceName', { unique: false });
                        }
                    };
                });
            },
            async addDesign(input, output) {
                await this.init();
                const entry = { id: Date.now(), timestamp: new Date().toISOString(), input, output: { device_name: output.device_name, generated_at: output.generated_at, original_prompt: output.original_prompt, downloads: output.downloads, stlData: output.stlData, scadContent: output.scadContent, jscadContent: output.jscadContent, circuitData: output.circuitData, firmwareContent: output.firmwareContent, bomContent: output.bomContent, instructionsContent: output.instructionsContent }, deviceName: output.device_name || 'unnamed' };
                return new Promise((resolve, reject) => { const tx = this.db.transaction([this.STORE_NAME], 'readwrite'); const request = tx.objectStore(this.STORE_NAME).put(entry); request.onsuccess = () => resolve(entry); request.onerror = () => reject(request.error); });
            },
            async getHistory() {
                await this.init();
                return new Promise((resolve, reject) => { const tx = this.db.transaction([this.STORE_NAME], 'readonly'); const request = tx.objectStore(this.STORE_NAME).index('timestamp').openCursor(null, 'prev'); const results = []; request.onsuccess = (e) => { const cursor = e.target.result; if (cursor) { results.push(cursor.value); cursor.continue(); } else resolve(results); }; request.onerror = () => reject(request.error); });
            },
            async loadDesign(id) { await this.init(); return new Promise((resolve, reject) => { const tx = this.db.transaction([this.STORE_NAME], 'readonly'); const request = tx.objectStore(this.STORE_NAME).get(id); request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error); }); },
            async deleteDesign(id) { await this.init(); return new Promise((resolve, reject) => { const tx = this.db.transaction([this.STORE_NAME], 'readwrite'); const request = tx.objectStore(this.STORE_NAME).delete(id); request.onsuccess = () => resolve(); request.onerror = () => reject(request.error); }); },
            async clearHistory() { await this.init(); return new Promise((resolve, reject) => { const tx = this.db.transaction([this.STORE_NAME], 'readwrite'); const request = tx.objectStore(this.STORE_NAME).clear(); request.onsuccess = () => resolve(); request.onerror = () => reject(request.error); }); }
        };

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => { const timer = setTimeout(onClose, 3000); return () => clearTimeout(timer); }, [onClose]);
            return <div className={`toast ${type} show`}>{message}</div>;
        };

        const AuthModal = ({ isOpen, onClose, initialTab = 'login' }) => {
            const [tab, setTab] = useState(initialTab);
            const [name, setName] = useState(""); const [email, setEmail] = useState(""); const [password, setPassword] = useState("");
            const [loading, setLoading] = useState(false); const [error, setError] = useState(""); const [toast, setToast] = useState(null);
            const { login, signup } = useAuth();

            const handleLogin = async (e) => {
                e.preventDefault(); setLoading(true); setError('');
                if (typeof track !== 'undefined') track('login_attempt', { email_domain: email.split('@')[1] });
                const result = await login(email, password); setLoading(false);
                if (result.success) { setToast({ message: `Welcome back! ${result.credits || 0} credits`, type: 'success' }); onClose(); }
                else { setError(result.error); }
            };

            const handleSignup = async (e) => {
                e.preventDefault(); setLoading(true); setError('');
                if (typeof track !== 'undefined') track('sign_up_attempt', { email_domain: email.split('@')[1] });
                const result = await signup(name, email, password); setLoading(false);
                if (result.success) { setToast({ message: 'Account created! Please sign in.', type: 'success' }); setTab('login'); setPassword(''); }
                else { setError(result.error); }
            };

            if (!isOpen) return null;
            return (

        // Until the backend returns a dedicated instructions artifact, build a sensible

        function buildFallbackInstructions(output) {
            if (!output) return null;
            const L = ['ASSEMBLY GUIDE', '', '1. 3D-print the enclosure using the STL from the 3D View tab.'];
            let comps = [];
            if (output.bomContent) {
                const rows = output.bomContent.split('\n').filter(r => r.trim()).slice(1);
                comps = rows.map(r => r.split(',')).filter(c => c.length > 3)
                    .map(c => `${(c[2] || '').trim()} (${(c[3] || '').trim()})`).filter(s => s.replace(/[()\s]/g, ''));
            }
            if (comps.length) { L.push('2. Gather the components from the BOM:'); comps.forEach(c => L.push('   - ' + c)); }
            else L.push('2. Gather the components listed in the BOM tab.');
            const conns = output.circuitData && output.circuitData.connections;
            if (conns && conns.length) {
                const nodes = output.circuitData.nodes || [];
                const name = id => { const n = nodes.find(x => x.id === id); return n ? String(n.label || id).split('\n')[0] : id; };
                L.push('3. Wire the components according to the circuit:');
                conns.slice(0, 10).forEach(cn => L.push(`   - ${name(cn.source)} → ${name(cn.target)}${cn.label ? ' (' + cn.label + ')' : ''}`));
            } else L.push('3. Wire the components as shown in the Circuit tab.');
            L.push('4. Flash the firmware from the Firmware tab to the microcontroller over USB.');
            L.push('5. Mount everything inside the enclosure and close it up.');
            L.push('', '(Auto-generated from your design. Detailed step-by-step instructions will appear here once the backend provides them.)');
            return L.join('\n');

        const App = () => {
            const { token, user, credits, fetchProfile } = useAuth();
            const [drawerOpen, setDrawerOpen] = useState(false);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [currentOutput, setCurrentOutput] = useState(null);
            const [history, setHistory] = useState([]);
            const [activeTab, setActiveTab] = useState('scad');
            const [error, setError] = useState(null);
            const [isBuildModalOpen, setIsBuildModalOpen] = useState(false);
            const [storageReady, setStorageReady] = useState(false);
            const [showAuth, setShowAuth] = useState(false);
            const [authTab, setAuthTab] = useState('login');
            const [toast, setToast] = useState(null);

            // Generation backend base URL.
            //  - Default: Modal-hosted AI hardware generation service.
            //  - Auth / payment / profile backend: window.ENV.API_URL (Render HaaS).
            //  - Override for a separate or stub endpoint via:
            //      localStorage.setItem('pitchaprint_generate_url', 'https://your-backend')
            const GEN_BASE = (localStorage.getItem('pitchaprint_generate_url') || '').replace(/\/+$/, '');
            const GENERATE_API_URL = GEN_BASE + "/api/generate";

            useEffect(() => {
                Storage.init().then(() => { setStorageReady(true); loadHistory(); }).catch(err => { console.error('Storage init failed:', err); setError('Failed to initialize storage'); });
            }, []);

            useEffect(() => { if (window.ENV.EMAILJS_PUBLIC_KEY && window.ENV.EMAILJS_PUBLIC_KEY !== 'YOUR_PUBLIC_KEY_HERE') emailjs.init(window.ENV.EMAILJS_PUBLIC_KEY); }, []);

            const loadHistory = async () => { try { const h = await Storage.getHistory(); setHistory(h); } catch (err) { console.error('Failed to load history:', err); } };

            const handleSubmit = async (e) => {
                e.preventDefault(); 
                if (!input.trim() || loading || !storageReady) return;
                if (!token) { 
                    setShowAuth(true); 
                    setAuthTab('login'); 
                    setToast({ message: 'Please sign in to generate designs', type: 'info' }); 
                    return; 
                }
                setLoading(true); 
                setError(null);
                try {
                    const response = await fetch(GENERATE_API_URL, { 
                        method: 'POST', 
                        headers: { 
                            'Content-Type': 'application/json', 
                            'Accept': 'application/json', 
                            ...(token ? { 'Authorization': `Bearer ${token}` } : {}) 
                        }, 
                        body: JSON.stringify({ prompt: input }) 
                    });
                    
                    // NEW: Handle 402 Payment Required
                    if (response.status === 402) {
                        setError('Insufficient credits. Please buy more credits via your profile menu.');
                        setToast({ message: 'Insufficient credits. Top up to continue.', type: 'error' });
                        if (typeof track !== 'undefined') track('insufficient_credits', { prompt_length: input.length });
                        setLoading(false);
                        return;
                    }
                    
                    if (response.status === 401 || response.status === 403) { 
                        setError('Session expired. Please sign in again.'); 
                        setShowAuth(true); 
                        setLoading(false); 
                        return; 
                    }
                    if (!response.ok) throw new Error('Generation failed');
                    
                    const data = await response.json();
                    
                    // NEW: Show credit toast if available
                    if (data.credits) {
                        const msg = data.credits.warning 
                            ? `Used ${data.credits.deducted} credits. ${data.credits.remaining.toLocaleString()} left. ${data.credits.warning}`
                            : `Used ${data.credits.deducted} credits (${data.credits.tokens_used.toLocaleString()} tokens). ${data.credits.remaining.toLocaleString()} left.`;
                        setToast({ message: msg, type: data.credits.warning ? 'error' : 'info' });
                        if (typeof track !== 'undefined') track('credits_deducted', { 
                            deducted: data.credits.deducted, 
                            remaining: data.credits.remaining, 
                            tokens_used: data.credits.tokens_used,
                            warning: !!data.credits.warning
                        });
                    }
                    
                    const baseUrl = GEN_BASE;
                    const fullUrl = (url) => url && (url.startsWith('http') ? url : `${baseUrl}${url}`);
                    const files = (data.downloads && data.downloads.individual_files) || {};
                    const fetchText = async (m) => { if (!m || !m.url) return null; const r = await fetch(fullUrl(m.url)); return r.ok ? await r.text() : null; };
                    const fetchJson = async (m) => { if (!m || !m.url) return null; const r = await fetch(fullUrl(m.url)); return r.ok ? await r.json() : null; };
                    const looksLikeJscad = (t) => !!t && /@jscad\/modeling|module\.exports|function\s+main\s*\(/.test(t);

                    const output = { ...data, stlData: null, jscadContent: null, scadContent: null, circuitData: null, firmwareContent: null, bomContent: null, instructionsContent: null, original_prompt: input };

                    // ---- 3D model: prefer JSCAD (new format), then OpenSCAD-slot-holding-JSCAD, then binary STL (old format) ----
                    const jscadText = await fetchText(files.jscad);
                    const scadText = await fetchText(files.scad);
                    if (jscadText) output.jscadContent = jscadText;
                    else if (looksLikeJscad(scadText)) output.jscadContent = scadText;
                    else output.scadContent = scadText;

                    // ---- instructions: dedicated field (new format) ----
                    output.instructionsContent = await fetchText(files.instructions || files.instructables);

                    // ---- the `stl` slot: new format carries instructable TEXT here; old format carries the binary STL model ----
                    if (files.stl && files.stl.url) {
                        const r = await fetch(fullUrl(files.stl.url));
                        if (r.ok) {
                            const buf = await r.arrayBuffer();
                            const head = new Uint8Array(buf.slice(0, Math.min(512, buf.byteLength)));
                            let printable = 0; for (let i = 0; i < head.length; i++) { const b = head[i]; if (b === 9 || b === 10 || b === 13 || (b >= 32 && b < 127)) printable++; }
                            const headText = new TextDecoder('utf-8', { fatal: false }).decode(head);
                            const isStl = /facet\s+normal/i.test(headText) || (head.length > 0 && printable / head.length < 0.85);
                            if (isStl) { if (buf.byteLength && !output.jscadContent) output.stlData = buf; }
                            else if (!output.instructionsContent) { output.instructionsContent = new TextDecoder().decode(buf); }
                        }
                    }

                    // ---- circuit / firmware / bom ----
                    output.circuitData = await fetchJson(files.circuit);
                    const firmwareText = await fetchText(files.firmware);
                    output.firmwareContent = firmwareText ? stripCodeFence(firmwareText) : null;
                    output.bomContent = await fetchText(files.bom);

                    if (!output.jscadContent && !(output.stlData instanceof ArrayBuffer)) throw new Error('No 3D model found in the generation response');
                    await Storage.addDesign(input, output);
                    setCurrentOutput(output); 
                    await loadHistory(); 
                    setInput(''); 
                    await fetchProfile();
                    if (typeof track !== 'undefined') track('generate_design', { 
                        device_name: output.device_name, 
                        has_circuit: !!output.circuitData,
                        has_firmware: !!output.firmwareContent,
                        has_bom: !!output.bomContent,
                        has_instructions: !!output.instructionsContent,
                        has_jscad: !!output.jscadContent,
                        has_stl: output.stlData instanceof ArrayBuffer,
                        prompt_length: input.length
                    });
                } catch (err) { 
                    console.error('Error:', err); 
                    setError(err.message); 
                    if (typeof track !== 'undefined') track('generate_design_error', { error: err.message, prompt_length: input.length });
                } finally { 
                    setLoading(false); 
                }
            };

            const loadHistoryItem = async (item) => { 
                try { 
                    const fullEntry = await Storage.loadDesign(item.id); 
                    if (fullEntry && fullEntry.output) { 
                        setCurrentOutput(fullEntry.output); 
                        setDrawerOpen(false); 
                        if (typeof track !== 'undefined') track('load_history_item', { device_name: fullEntry.output.device_name, id: item.id });
                    } else { 
                        setError('Design not found in storage'); 
                    } 
                } catch (err) { 
                    console.error('Error loading history item:', err); 
                    setError('Failed to load design from history'); 
                } 
            };
            
            const deleteHistoryItem = async (id, e) => { 
                e.stopPropagation(); 
                if (!confirm('Delete this design?')) return; 
                try { 
                    await Storage.deleteDesign(id); 
                    await loadHistory(); 
                    if (typeof track !== 'undefined') track('delete_history_item', { id: id });
                } catch (err) { 
                    console.error('Delete failed:', err); 
                } 
            };
            
            const clearAllHistory = async () => { 
                if (!confirm('Clear all history?')) return; 
                try { 
                    await Storage.clearHistory(); 
                    setHistory([]); 
                    if (typeof track !== 'undefined') track('clear_history');
                } catch (err) { 
                    console.error('Clear failed:', err); 
                } 
            };
            
            const downloadFile = (content, filename, type) => { 
                const blob = new Blob([content], { type }); 
                const url = URL.createObjectURL(blob); 
                const a = document.createElement('a'); 
                a.href = url; 
                a.download = filename; 
                a.click(); 
                URL.revokeObjectURL(url); 
            };
            
            const triggerDownload = (data, filename, type) => {
                const blob = new Blob([data], { type });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
            };
            const downloadSTL = () => {
                const name = `${currentOutput?.device_name || 'model'}.stl`;
                // Old format: a binary STL is already in hand.
                if (currentOutput?.stlData instanceof ArrayBuffer) { triggerDownload(currentOutput.stlData, name, 'application/sla'); return; }
                // New format: convert the JSCAD model to STL in the browser via the embedded viewer.
                if (!currentOutput?.jscadContent) return;
                setActiveTab('scad'); // make sure the viewer iframe is mounted
                let done = false;
                const onExported = (e) => {
                    if (!e.data || e.data.type !== 'stl-exported' || !e.data.buffer) return;
                    done = true;
                    window.removeEventListener('message', onExported);
                    triggerDownload(e.data.buffer, e.data.name || name, 'application/octet-stream');
                };
                window.addEventListener('message', onExported);
                let tries = 0;
                const ask = () => {
                    if (done) return;
                    const ifr = document.querySelector('iframe[title="3D Viewer"]');
                    if (ifr && ifr.contentWindow) { try { ifr.contentWindow.postMessage({ type: 'export-stl', name }, '*'); } catch (err) {} }
                    tries++;
                    if (tries < 25) setTimeout(ask, 400);
                    else window.removeEventListener('message', onExported);
                };
                setTimeout(ask, 300);
            };

            return (
                <div className="min-h-screen bg-white">
                    <header className="minimal-header">
                        <div className="flex items-center gap-3">
                            <button onClick={() => setDrawerOpen(true)} className="p-2 hover:bg-gray-100 rounded-lg transition-colors"><svg className="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 6h16M4 12h16M4 18h16" /></svg></button>
                            <h1 className="text-lg font-bold tracking-tight">pitchaprint</h1>
                            {token && credits > 0 && <span className="balance-badge hidden sm:inline-flex"><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>{credits.toLocaleString()}</span>}
                        </div>
                        <div className="flex items-center gap-4">
                            <a href="about_us.html" className="text-sm text-gray-600 hover:text-black transition-colors">About</a>
                            {currentOutput && <button onClick={() => { setIsBuildModalOpen(true); if (typeof track !== 'undefined') track('open_build_order', { device_name: currentOutput?.device_name, source: 'header' }); }} className="px-3 py-1.5 bg-black text-white text-xs font-medium rounded-lg hover:bg-gray-800 transition-colors">Build</button>}
                            {user ? <UserMenu /> : <button onClick={() => { setShowAuth(true); setAuthTab('login'); if (typeof track !== 'undefined') track('click_sign_in'); }} className="text-sm font-medium text-gray-900 hover:text-black transition-colors">Sign In</button>}
                        </div>
                    </header>

                    <div className={`history-drawer ${drawerOpen ? 'open' : ''}`}>
                        <div className="p-4 border-b border-gray-100 flex items-center justify-between">
                            <h2 className="font-medium text-sm text-gray-500 uppercase tracking-wider">History</h2>
                            <button onClick={() => setDrawerOpen(false)} className="p-1 hover:bg-gray-100 rounded"><svg className="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg></button>
                        </div>
                        <div className="overflow-auto h-[calc(100vh-60px)]">
                            {history.length === 0 ? <div className="p-6 text-sm text-gray-400 text-center">No designs yet</div> : (
                                <>
                                    <div className="p-2"><button onClick={clearAllHistory} className="w-full py-2 text-xs text-red-500 hover:bg-red-50 rounded transition-colors">Clear history</button></div>
                                    {history.map((item) => (
                                        <div key={item.id} className="group relative w-full text-left p-4 border-b border-gray-50 hover:bg-gray-50 transition-colors cursor-pointer" onClick={() => loadHistoryItem(item)}>
                                            <div className="font-medium text-sm text-gray-900 truncate pr-8">{item.input}</div>
                                            <div className="text-xs text-gray-400 mt-1">{new Date(item.timestamp).toLocaleDateString()}</div>
                                            <button onClick={(e) => deleteHistoryItem(item.id, e)} className="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-gray-300 hover:text-red-500 hover:bg-red-50 rounded opacity-0 group-hover:opacity-100 transition-all" title="Delete"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>
                                        </div>
                                    ))}
                                </>
                            )}
                        </div>
                    </div>
                    {drawerOpen && <div className="fixed inset-0 bg-black/20 z-30" style={{top: '60px'}} onClick={() => setDrawerOpen(false)} />}

                    <main className="pt-24 pb-32 px-6 max-w-5xl mx-auto">
                        {loading ? <LoadingScreen /> : !currentOutput ? (
                            <div className="flex flex-col items-center justify-center min-h-[50vh]">
                                <h2 className="text-2xl font-light text-center text-gray-900 mb-2 lowercase">design hardware from text</h2>
                                <p className="text-xs text-gray-400">tunajua uko blank , uliza ; - P</p>
                                {!token && <button onClick={() => { setShowAuth(true); setAuthTab('signup'); if (typeof track !== 'undefined') track('click_get_started'); }} className="mt-6 px-6 py-2 bg-black text-white text-sm font-medium rounded-lg hover:bg-gray-800 transition-colors">Get Started</button>}
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <div className="flex items-center justify-between pb-4 border-b border-gray-100">
                                    <div><h2 className="text-lg font-medium">{currentOutput.device_name}</h2><p className="text-xs text-gray-400 mt-1">{new Date(currentOutput.generated_at).toLocaleString()}</p></div>
                                    <div className="flex gap-2">
                                        <button onClick={() => { setIsBuildModalOpen(true); if (typeof track !== 'undefined') track('open_build_order', { device_name: currentOutput?.device_name, source: 'results' }); }} className="px-4 py-1.5 text-xs bg-black text-white rounded-lg hover:bg-gray-800 transition-colors font-medium">Build</button>
                                        <button onClick={() => { downloadSTL(); if (typeof track !== 'undefined') track('download_stl', { device_name: currentOutput?.device_name }); }} className="px-3 py-1.5 text-xs border border-gray-200 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">Download STL</button>
                                    </div>
                                </div>
                                <div className="flex gap-6 border-b border-gray-100">
                                    {[{ id: 'scad', label: '3D View' }, { id: 'circuit', label: 'Circuit' }, { id: 'firmware', label: 'Firmware' }, { id: 'instructions', label: 'Instructions' }, { id: 'bom', label: 'BOM' }].map(tab => <button key={tab.id} onClick={() => { setActiveTab(tab.id); if (typeof track !== 'undefined') track('tab_switch', { tab: tab.id, device_name: currentOutput?.device_name }); }} className={`pb-3 text-sm font-medium ${activeTab === tab.id ? 'tab-active' : 'tab-inactive'}`}>{tab.label}</button>)}
                                </div>
                                <div className="py-4">
                                    {activeTab === 'scad' && (
                                        <div className="space-y-4">
                                            {(currentOutput?.jscadContent || currentOutput?.stlData instanceof ArrayBuffer) ? <Model3DViewer stlData={currentOutput.stlData} jscadContent={currentOutput.jscadContent} deviceName={currentOutput.device_name} key={currentOutput.device_name} /> : <div className="w-full h-[400px] flex items-center justify-center bg-gray-50 rounded-xl border border-gray-200"><span className="text-gray-400 text-sm">No 3D model available</span></div>}
                                            
                                        </div>
                                    )}
                                    {activeTab === 'circuit' && <div>{currentOutput?.circuitData?.nodes ? <CircuitViewer circuitData={currentOutput.circuitData} /> : <div className="w-full h-[400px] flex items-center justify-center bg-gray-50 rounded-xl border border-gray-200"><span className="text-gray-400 text-sm">No circuit diagram available</span></div>}</div>}
                                    {activeTab === 'firmware' && <div><FirmwareEditor code={currentOutput?.firmwareContent || ''} /><div className="mt-4 flex justify-end"><button onClick={() => { downloadFile(currentOutput.firmwareContent, `${currentOutput.device_name}.ino`, 'text/plain'); if (typeof track !== 'undefined') track('download_firmware', { device_name: currentOutput?.device_name }); }} className="text-xs text-gray-600 hover:text-black flex items-center gap-1"><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>Download .ino</button></div></div>}
                                    {activeTab === 'instructions' && (() => { const instr = currentOutput?.instructionsContent || buildFallbackInstructions(currentOutput); return <div><InstructionsViewer content={instr} />{instr && <div className="mt-4 flex justify-end"><button onClick={() => { downloadFile(instr, `${currentOutput.device_name}_instructions.txt`, 'text/plain'); if (typeof track !== 'undefined') track('download_instructions', { device_name: currentOutput?.device_name }); }} className="text-xs text-gray-600 hover:text-black flex items-center gap-1"><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>Download</button></div>}</div>; })()}
                                    {activeTab === 'bom' && <div><BOMTable csvData={currentOutput?.bomContent || null} /><div className="mt-4 flex justify-end"><button onClick={() => { downloadFile(currentOutput.bomContent, `${currentOutput.device_name}_BOM.csv`, 'text/csv'); if (typeof track !== 'undefined') track('download_bom', { device_name: currentOutput?.device_name }); }} className="text-xs text-gray-600 hover:text-black flex items-center gap-1"><svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>Download CSV</button></div></div>}
                                </div>
                            </div>
                        )}
                    </main>

                    <div className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-gray-100 p-4 z-40">
                        <div className="max-w-2xl mx-auto">
                            <form onSubmit={handleSubmit} className="relative">
                                <div className="input-line flex items-center gap-2 bg-gray-50 rounded-xl px-4 py-3 border border-gray-200 focus-within:border-gray-400 transition-colors">
                                    <input type="text" value={input} onChange={(e) => setInput(e.target.value)} placeholder={currentOutput ? "Design another device..." : "Describe your hardware device..."} className="flex-1 bg-transparent outline-none text-sm placeholder:text-gray-400" disabled={loading || !storageReady} />
                                    <button type="submit" disabled={loading || !input.trim() || !storageReady} className="p-2 bg-black text-white rounded-lg disabled:opacity-30 disabled:cursor-not-allowed hover:bg-gray-800 transition-colors">
                                        {loading ? <div className="flex gap-1"><span className="loading-dot w-1 h-1 bg-white rounded-full"></span><span className="loading-dot w-1 h-1 bg-white rounded-full"></span><span className="loading-dot w-1 h-1 bg-white rounded-full"></span></div> : <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 12h14M12 5l7 7-7 7" /></svg>}
                                    </button>
                                </div>
                                {error && <div className="absolute -top-8 left-0 right-0 text-center text-xs text-red-500">{error}</div>}
                            </form>
                        </div>
                    </div>

                    <AuthModal isOpen={showAuth} onClose={() => setShowAuth(false)} initialTab={authTab} />
                    <BuildOrderModal isOpen={isBuildModalOpen} onClose={() => setIsBuildModalOpen(false)} currentOutput={currentOutput} />
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AuthProvider><App /></AuthProvider>);
    </script>
</body>
</html>
